<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">USTC Time Series Logo</title>
  <desc id="desc">Simplified vector logo with a robot icon, trend chart, and TIME SERIES wordmark.</desc>
  <defs>
    <linearGradient id="accent-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2b2b"/>
      <stop offset="100%" stop-color="#d60000"/>
    </linearGradient>
    <linearGradient id="accent-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e22"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f766e" flood-opacity="0.10"/>
    </filter>
  </defs>

  <g filter="url(#soft-shadow)">
    <g transform="translate(36 42)">
      <line x1="86" y1="28" x2="82" y2="4" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
      <circle cx="80" cy="0" r="18" fill="url(#accent-red)" stroke="#111111" stroke-width="8"/>

      <circle cx="0" cy="138" r="26" fill="url(#accent-red)" stroke="#111111" stroke-width="8"/>
      <circle cx="206" cy="138" r="26" fill="url(#accent-red)" stroke="#111111" stroke-width="8"/>

      <rect x="12" y="34" width="196" height="154" rx="66" fill="#ffffff" stroke="#050505" stroke-width="8"/>
      <rect x="48" y="74" width="124" height="86" rx="34" fill="url(#accent-dark)"/>

      <ellipse cx="94" cy="116" rx="15" ry="21" fill="#ffffff"/>
      <ellipse cx="140" cy="102" rx="15" ry="21" fill="#ffffff"/>
      <circle cx="105" cy="114" r="6" fill="#050505"/>
      <circle cx="149" cy="100" r="6" fill="#050505"/>

      <path d="M44 196c26 18 106 18 132 0" fill="none" stroke="#050505" stroke-width="10" stroke-linecap="round"/>

      <rect x="200" y="18" width="90" height="90" rx="45" fill="#ffffff" stroke="#050505" stroke-width="8"/>
      <path d="M222 74l20-26 18 14 26-34" fill="none" stroke="url(#accent-red)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M278 28l8 0 0 8" fill="none" stroke="url(#accent-red)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="228" y1="106" x2="216" y2="142" stroke="#050505" stroke-width="14" stroke-linecap="round"/>
      <circle cx="212" cy="154" r="18" fill="url(#accent-red)" stroke="#050505" stroke-width="8"/>

      <path d="M12 240l-34 22M28 250l-46 34M56 254l-58 38" fill="none" stroke="#ff1717" stroke-width="10" stroke-linecap="round"/>
    </g>

    <g transform="translate(348 54)">
      <g opacity="0.20" stroke="#aeb4bf" stroke-width="12" stroke-linecap="round">
        <line x1="44" y1="108" x2="44" y2="148"/>
        <line x1="116" y1="96" x2="116" y2="148"/>
        <line x1="188" y1="84" x2="188" y2="148"/>
        <line x1="260" y1="110" x2="260" y2="148"/>
        <line x1="332" y1="74" x2="332" y2="148"/>
        <line x1="404" y1="88" x2="404" y2="148"/>
        <line x1="476" y1="64" x2="476" y2="148"/>
        <line x1="548" y1="82" x2="548" y2="148"/>
        <line x1="620" y1="54" x2="620" y2="148"/>
        <line x1="692" y1="40" x2="692" y2="148"/>
      </g>

      <path d="M12 126L108 54L210 92L314 16L408 76L500 8L590 40L682 -42"
