        <circle cx="210" cy="92" r="16" stroke="url(#accent-red)"/>
        <circle cx="314" cy="16" r="16" stroke="url(#accent-red)"/>
        <circle cx="408" cy="76" r="16" stroke="#4a0000"/>
        <circle cx="500" cy="8" r="16" stroke="#2f0000"/>
        <circle cx="590" cy="40" r="16" stroke="#050505"/>
      </g>

      <path d="M670 -58l18 12-8 2 16 4" fill="none" stroke="#ff1717" stroke-width="8" stroke-linecap="round"/>

      <text x="0" y="256"
