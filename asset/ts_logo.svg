            font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
            font-size="104"
            font-weight="900"
            letter-spacing="2">TIME</text>
      <text x="384" y="256"
            fill="#050505"
            font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
            font-size="104"
            font-weight="900"
