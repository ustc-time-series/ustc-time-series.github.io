<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Applied Research Overview</title>
  <desc id="desc">Poster-style overview of power load, renewable generation, and cloud traffic forecasting scenarios.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fffd"/>
      <stop offset="100%" stop-color="#e5f6f2"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#d6ebe5" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f766e" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="540" rx="32" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="540" rx="32" fill="url(#grid)" opacity="0.55"/>
  <rect x="52" y="40" width="1096" height="58" rx="18" fill="#ffffff" opacity="0.76" stroke="#d6ebe5"/>
  <text x="84" y="76" fill="#0f766e" font-family="Segoe UI, PingFang SC, sans-serif" font-size="26" font-weight="800">REAL-WORLD TIME SERIES APPLICATIONS</text>
  <text x="760" y="76" fill="#53716b" font-family="Segoe UI, PingFang SC, sans-serif" font-size="18">Power Load · Renewable Energy · Cloud Traffic</text>

  <g filter="url(#shadow)">
    <rect x="64" y="126" width="322" height="336" rx="28" fill="#ffffff"/>
    <rect x="64" y="126" width="322" height="92" rx="28" fill="url(#teal)"/>
    <text x="92" y="168" fill="#d6faf5" font-family="Segoe UI, PingFang SC, sans-serif" font-size="12" font-weight="700" letter-spacing="2">SCENARIO A</text>
    <text x="92" y="198" fill="#ffffff" font-family="Segoe UI, PingFang SC, sans-serif" font-size="28" font-weight="800">城市电力负荷</text>
    <rect x="92" y="238" width="266" height="132" rx="20" fill="#f4fbf9" stroke="#d3ece6"/>
    <rect x="116" y="272" width="36" height="72" rx="10" fill="#d8f1ec"/>
    <rect x="162" y="248" width="42" height="96" rx="10" fill="#c8ebe4"/>
    <rect x="214" y="228" width="42" height="116" rx="10" fill="#b7e5dd"/>
    <rect x="266" y="258" width="42" height="86" rx="10" fill="#a4ddd4"/>
    <polyline points="112,322 152,304 192,312 232,272 272,290 312,246 338,256" fill="none" stroke="#0f766e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="312" cy="246" r="10" fill="#14b8a6"/>
    <rect x="92" y="390" width="126" height="44" rx="14" fill="#eef9f6" stroke="#d7ede7"/>
    <rect x="232" y="390" width="126" height="44" rx="14" fill="#eef9f6" stroke="#d7ede7"/>
    <text x="112" y="417" fill="#46625d" font-family="Segoe UI, PingFang SC, sans-serif" font-size="16" font-weight="700">Weather</text>
    <text x="254" y="417" fill="#46625d" font-family="Segoe UI, PingFang SC, sans-serif" font-size="16" font-weight="700">Holiday Shift</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="439" y="104" width="322" height="358" rx="28" fill="#ffffff"/>
    <rect x="439" y="104" width="322" height="92" rx="28" fill="url(#green)"/>
    <text x="467" y="146" fill="#e6ffef" font-family="Segoe UI, PingFang SC, sans-serif" font-size="12" font-weight="700" letter-spacing="2">SCENARIO B</text>
    <text x="467" y="176" fill="#ffffff" font-family="Segoe UI, PingFang SC, sans-serif" font-size="28" font-weight="800">新能源发电</text>
    <circle cx="528" cy="270" r="34" fill="#fde68a"/>
    <path d="M510 270 C520 242 536 242 546 270" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
    <g transform="translate(610 226)" stroke="#0f766e" stroke-width="8" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="70"/>
      <line x1="-34" y1="20" x2="0" y2="38"/>
      <line x1="34" y1="20" x2="0" y2="38"/>
      <line x1="0" y1="0" x2="0" y2="38"/>
    </g>
    <rect x="472" y="314" width="258" height="78" rx="20" fill="#f5fbf7" stroke="#d9eee1"/>
    <polyline points="492,368 532,344 572,352 612,314 652,326 704,286" fill="none" stroke="#16a34a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M494 334 C510 314 528 312 544 330 C552 312 576 308 590 324 C610 308 640 314 654 334" fill="none" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
    <rect x="472" y="408" width="110" height="34" rx="12" fill="#eef9f3" stroke="#d9eee1"/>
    <rect x="590" y="408" width="140" height="34" rx="12" fill="#eef9f3" stroke="#d9eee1"/>
    <text x="490" y="430" fill="#426356" font-family="Segoe UI, PingFang SC, sans-serif" font-size="15" font-weight="700">Wind Speed</text>
    <text x="615" y="430" fill="#426356" font-family="Segoe UI, PingFang SC, sans-serif" font-size="15" font-weight="700">Ramp Events</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="814" y="136" width="322" height="326" rx="28" fill="#ffffff"/>
    <rect x="814" y="136" width="322" height="92" rx="28" fill="url(#blue)"/>
    <text x="842" y="178" fill="#d9f7ff" font-family="Segoe UI, PingFang SC, sans-serif" font-size="12" font-weight="700" letter-spacing="2">SCENARIO C</text>
    <text x="842" y="208" fill="#ffffff" font-family="Segoe UI, PingFang SC, sans-serif" font-size="28" font-weight="800">云服务流量</text>
    <rect x="846" y="254" width="258" height="118" rx="20" fill="#f3fbfd" stroke="#d7ebef"/>
    <rect x="870" y="284" width="54" height="54" rx="12" fill="#d8eff4"/>
    <rect x="936" y="266" width="54" height="72" rx="12" fill="#c6e6ee"/>
    <rect x="1002" y="296" width="54" height="42" rx="12" fill="#b2dceb"/>
    <polyline points="866,344 906,330 946,300 986,312 1026,268 1066,278" fill="none" stroke="#0891b2" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="1026" cy="268" r="9" fill="#ef4444"/>
    <rect x="846" y="392" width="118" height="40" rx="14" fill="#eef8fb" stroke="#d7ebef"/>
    <rect x="976" y="392" width="128" height="40" rx="14" fill="#eef8fb" stroke="#d7ebef"/>
    <text x="868" y="417" fill="#486971" font-family="Segoe UI, PingFang SC, sans-serif" font-size="15" font-weight="700">Auto Scale</text>
    <text x="997" y="417" fill="#486971" font-family="Segoe UI, PingFang SC, sans-serif" font-size="15" font-weight="700">Capacity Plan</text>
  </g>

  <path d="M387 280 C408 280 420 278 438 278" fill="none" stroke="#9fcfc5" stroke-width="3" stroke-dasharray="7 8"/>
  <path d="M762 292 C784 292 792 292 814 292" fill="none" stroke="#9fcfc5" stroke-width="3" stroke-dasharray="7 8"/>
</svg>
