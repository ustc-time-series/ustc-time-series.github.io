<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Power Load Forecasting Scene</title>
  <desc id="desc">Poster-like city power load illustration with dashboard, skyline, annotations, and load curve.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fffd"/>
      <stop offset="100%" stop-color="#eaf8f5"/>
    </linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0 L0 0 0 24" fill="none" stroke="#e1f0eb" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="720" height="420" rx="28" fill="url(#bg)"/>
  <rect width="720" height="420" rx="28" fill="url(#grid)" opacity="0.7"/>
  <rect x="34" y="34" width="652" height="352" rx="28" fill="#ffffff" stroke="#d5ece6"/>
  <rect x="34" y="34" width="652" height="96" rx="28" fill="url(#head)"/>
  <text x="68" y="76" fill="#d5faf4" font-family="Segoe UI, PingFang SC, sans-serif" font-size="12" font-weight="700" letter-spacing="2">POSTER PANEL 01</text>
  <text x="68" y="108" fill="#ffffff" font-family="Segoe UI, PingFang SC, sans-serif" font-size="28" font-weight="800">城市电力负荷监测与预测</text>
  <text x="482" y="76" fill="#d5faf4" font-family="Segoe UI, PingFang SC, sans-serif" font-size="14" font-weight="700">Peak Control</text>
  <text x="482" y="100" fill="#d5faf4" font-family="Segoe UI, PingFang SC, sans-serif" font-size="14" font-weight="700">Holiday Shift</text>

  <rect x="62" y="158" width="392" height="188" rx="22" fill="#f5fbf9" stroke="#d7ede7"/>
  <rect x="88" y="188" width="44" height="126" rx="10" fill="#d6efea"/>
  <rect x="142" y="164" width="52" height="150" rx="10" fill="#c6e9e1"/>
  <rect x="204" y="204" width="44" height="110" rx="10" fill="#b4dfd7"/>
  <rect x="258" y="182" width="48" height="132" rx="10" fill="#9fd7cf"/>
  <rect x="316" y="148" width="58" height="166" rx="10" fill="#8dcec4"/>
  <polyline points="84,304 128,286 172,294 216,266 260,278 304,236 348,252 392,214 432,228" fill="none" stroke="#0f766e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="392" cy="214" r="10" fill="#14b8a6"/>
  <line x1="84" y1="320" x2="432" y2="320" stroke="#bfded7" stroke-width="4" stroke-linecap="round"/>
  <line x1="84" y1="320" x2="84" y2="176" stroke="#bfded7" stroke-width="4" stroke-linecap="round"/>
  <text x="92" y="178" fill="#67837d" font-family="Segoe UI, PingFang SC, sans-serif" font-size="12" font-weight="700">LOAD CURVE + DISTRICT PROFILE</text>

  <rect x="478" y="158" width="176" height="120" rx="20" fill="#f5fbf9" stroke="#d7ede7"/>
  <circle cx="548" cy="202" r="26" fill="#fde68a"/>
  <path d="M520 234 C534 218 564 218 578 234 C590 246 596 258 598 272 H500 C502 256 508 244 520 234 Z" fill="#d6efea"/>
  <g stroke="#0f766e" stroke-width="5" stroke-linecap="round">
    <line x1="548" y1="162" x2="548" y2="148"/>
    <line x1="516" y1="178" x2="506" y2="168"/>
    <line x1="580" y1="178" x2="590" y2="168"/>
  </g>
  <text x="500" y="296" fill="#4e6762" font-family="Segoe UI, PingFang SC, sans-serif" font-size="14" font-weight="700">Weather-sensitive features</text>

  <rect x="478" y="294" width="176" height="52" rx="16" fill="#eef9f6" stroke="#d7ede7"/>
  <text x="500" y="325" fill="#0f766e" font-family="Segoe UI, PingFang SC, sans-serif" font-size="15" font-weight="800">Joint diagnosis: load, weather, holiday</text>
</svg>
